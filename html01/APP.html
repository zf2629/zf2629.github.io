<style>

/* 全局重置与基础设置 */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background-color: #f4f6f9;
    color: #333;
    line-height: 1.6;
    padding: 20px;
}

/* 主容器限制最大宽度并居中 */
dl {
    max-width: 1200px;
    margin: 0 auto;
}

/* 隐藏默认的 DL/DT 缩进，改为块级布局 */
dt, dd {
    display: block;
}

/* 分类标题样式 (H3) */
h3 {

    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    margin-top: 30px;
    margin-bottom: 15px;
    font-size: 1.2rem;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    display: inline-block;
    min-width: 100px;
}











/* 第一个标题去掉上边距 */
h3:first-of-type {
    margin-top: 0;
}

/* 链接容器 (内部的 DL) 设置为 Grid 网格布局 */
h3 + dl {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 15px;
    padding: 0;
}

/* 单个链接项 (DT) 样式 */
h3 + dl dt {
    margin: 0;
}

/* 链接卡片样式 */
h3 + dl dt a {
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    background-color: #ffffff;
    color: #444;
    padding: 15px 20px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    transition: all 0.3s ease;
    border: 1px solid #e1e4e8;
    height: 100%;
    font-weight: 500;
    text-align: center;
}

/* 链接悬停效果 */
h3 + dl dt a:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(118, 75, 162, 0.2);
    border-color: #764ba2;
    color: #764ba2;
}

/* 针对无效链接或特殊标记的样式（可选） */
a[href^="测试"] {
    opacity: 0.6;
    background-color: #fafafa;
    border-style: dashed;
}

/* 响应式调整：小屏幕下单列显示 */
@media (max-width: 600px) {
    h3 + dl {
        grid-template-columns: 1fr;
    }
    
    body {
        padding: 10px;
    }
}



dt {
    margin-bottom: 10px; /* 在每个DT下方增加20px间距 */
}
